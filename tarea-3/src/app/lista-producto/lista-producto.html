<div>
    <ul>
        @for (producto of productos; track producto) {
        <p>
            <li>{{producto.title}}
                {{producto.price | currency: 'USD'}}
                {{producto.creationAt | date: 'shortDate'}}
            </li>
            <li>
                <p>Precio con descuento: {{producto.price | descuento:10 | currency}}</p>

            </li>
        </p>
        <br>
        }
    </ul>
</div>
